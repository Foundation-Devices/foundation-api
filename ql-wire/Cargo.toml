[package]
name = "ql-wire"
version = "0.1.0"
edition = "2021"
description = "Quantum Link wire format types and crypto helpers"
license = "Proprietary"

[dependencies]
bc-components = { version = "0.28.0", default-features = false, features = [
  "pqcrypto",
] }
rkyv = { version = "0.8", default-features = false, features = [
  "std",
  "bytecheck",
  "little_endian",
  "unaligned",
  "pointer_width_32",
] }
thiserror = { version = "2" }

[dev-dependencies]
libcrux-aesgcm = "0.0.7"
