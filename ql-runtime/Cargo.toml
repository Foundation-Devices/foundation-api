[package]
name = "ql-runtime"
version = "0.1.0"
edition = "2021"
description = "Quantum Link runtime"
license = "Proprietary"

[features]
default = []
rpc = ["dep:ql-rpc"]

[dependencies]
async-channel = { version = "2.5" }
futures-lite = { version = "2.5" }
oneshot = { version = "0.1.11" }
piper = { version = "0.2.4" }
ql-fsm = { path = "../ql-fsm" }
ql-rpc = { path = "../ql-rpc", optional = true }
ql-wire = { path = "../ql-wire" }
thiserror = { version = "2" }

[dev-dependencies]
bytes = "1"
libcrux-aesgcm = "0.0.7"
sha2 = "0.10"
tokio = { version = "1.44", features = ["macros", "rt", "time", "sync"] }
